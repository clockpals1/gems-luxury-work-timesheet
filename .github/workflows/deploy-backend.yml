name: Deploy Backend to Container Platform

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Railway (or Render/Cloudflare Run)
        # This step depends on your chosen platform
        # Uncomment the appropriate section below:

        # Option 1: Railway
        # run: |
        #   npx railway login --token ${{ secrets.RAILWAY_TOKEN }}
        #   npx railway up --service ${{ secrets.RAILWAY_SERVICE_ID }}

        # Option 2: Render
        # run: |
        #   curl -X POST \
        #     -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
        #     -H "Content-Type: application/json" \
        #     https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys

        # Option 3: Cloudflare Run (Cloudflare Workers for Containers)
        run: |
          echo "Configure deployment to your chosen container platform"
          echo "Update this workflow with platform-specific deployment commands"
