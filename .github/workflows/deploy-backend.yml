name: Deploy Backend to Render

# Triggers a Render deploy via the Render Deploy Hook.
# Set RENDER_DEPLOY_HOOK_URL in GitHub repo secrets:
#   Render → your service → Settings → Deploy Hook → copy URL
#
# Render itself builds the Docker image from backend/Dockerfile based on
# render.yaml at the repo root, so this workflow only needs to ping the hook.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'render.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  trigger-render-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "ERROR: RENDER_DEPLOY_HOOK_URL secret is not set."
            echo "Go to: Render dashboard → gems-luxury-backend → Settings → Deploy Hook"
            echo "Copy the URL and add it as RENDER_DEPLOY_HOOK_URL in GitHub repo secrets."
            exit 1
          fi
          echo "Triggering Render deploy..."
          curl -fsSL -X POST "$HOOK_URL"
          echo "Render deploy triggered successfully."
