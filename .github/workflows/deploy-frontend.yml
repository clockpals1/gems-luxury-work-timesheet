name: Deploy Frontend to Cloudflare Pages

# Builds the React app and deploys it to Cloudflare Pages using Wrangler.
# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN     - token with Pages:Edit permission
#   CLOUDFLARE_ACCOUNT_ID    - your Cloudflare account ID
#   REACT_APP_BACKEND_URL    - public URL of the Render backend, e.g.
#                              https://gems-luxury-backend.onrender.com

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & deploy to Cloudflare Pages
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: ./frontend
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
          CI: 'false'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/build --project-name=gems-luxury-frontend --branch=main
