# Render Blueprint — provisions the FastAPI backend as a Docker web service.
# Apply by clicking "New → Blueprint" in Render and pointing at this repo,
# or run `render blueprint launch` with the Render CLI.
services:
  - type: web
    name: gems-luxury-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: gems-luxury
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_MINUTES
        value: "720"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_NAME
        value: gemsluxury
      - key: PUBLIC_BACKEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: gems-luxury
      - key: R2_PUBLIC_URL
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
